services:
  - type: web_service
    name: executiveos-backend
    env: docker
    plan: free
    branch: main
    root: backend

  - type: static_site
    name: executiveos-frontend
    env: node
    plan: free
    branch: main
    buildCommand: npm install --silent && npm run build
    publishPath: dist
    root: frontend
    envVars:
      - key: VITE_API_URL
        fromService: executiveos-backend
        value: "${RENDER_SERVICE_URL}"
