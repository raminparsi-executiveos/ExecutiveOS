services:
  - type: web
    name: executiveos-backend
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: executiveos-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini

  - type: web
    name: executiveos-frontend
    runtime: static
    plan: free
    branch: main
    rootDir: frontend
    buildCommand: npm install --no-audit --no-fund && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: executiveos-backend
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

databases:
  - name: executiveos-db
    plan: free
