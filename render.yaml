services:
  - type: web_service
    name: executiveos-backend
    env: python
    runtime: python-3.13
    plan: free
    branch: main
    buildCommand: bash -lc 'export CARGO_HOME=/tmp/cargo RUSTUP_HOME=/tmp/rustup PATH=/tmp/cargo/bin:/tmp/rustup/bin:/usr/bin:/bin && curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path && source /tmp/cargo/env && python -m pip install --upgrade pip setuptools wheel && PATH=/tmp/cargo/bin:/tmp/rustup/bin:$PATH pip install -r requirements.txt'
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    root: backend

  - type: static_site
    name: executiveos-frontend
    env: node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    publishPath: dist
    root: frontend
    envVars:
      - key: VITE_API_URL
        fromService: executiveos-backend
        value: "${RENDER_SERVICE_URL}"
